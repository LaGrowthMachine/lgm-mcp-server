services:
  lgm-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - LGM_API_URL=${LGM_API_URL:-https://apiv2.lagrowthmachine.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
