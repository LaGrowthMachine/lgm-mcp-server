services:
  eval-postgres:
    image: postgres:16-alpine
    container_name: lgm-eval-postgres
    environment:
      POSTGRES_USER: eval
      POSTGRES_PASSWORD: eval
      POSTGRES_DB: eval
    ports:
      - "5433:5432"
    volumes:
      - lgm-eval-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d eval"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lgm-eval-pgdata:
